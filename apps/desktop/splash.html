<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;height:100%;background:#020616;color:#dce6ff;font-family:system-ui,sans-serif;overflow:hidden}
  .wrap{height:100%;display:grid;place-items:center}
  .orb{width:90px;height:90px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#9fe9ff,#5563ff 45%,#1a1740 100%);
    box-shadow:0 0 60px rgba(89,140,255,.6);animation:p 2.4s ease-in-out infinite}
  @keyframes p{50%{transform:scale(1.08);box-shadow:0 0 90px rgba(89,140,255,.9)}}
  .t{letter-spacing:.5em;margin-top:22px;font-weight:800;font-size:20px}
  .s{color:#8aa0d6;font-size:12px;letter-spacing:.2em;margin-top:6px}
</style></head><body><div class="wrap"><div style="text-align:center">
  <div class="orb"></div><div class="t">S H I M S</div><div class="s">STARTING LOCAL ENGINE…</div>
</div></div></body></html>
