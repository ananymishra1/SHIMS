# SHIMS Omni + Enterprise — Docker Compose
# Usage:
#   docker-compose up -d          # start both services
#   docker-compose logs -f        # tail logs
#   docker-compose down           # stop and remove

version: "3.8"

services:
  shims-omni:
    build: .
    image: shims:latest
    container_name: shims-omni
    command: >
      python -m uvicorn backend.app.main:app
      --host 0.0.0.0 --port 8010
    ports:
      - "8010:8010"
    volumes:
      - shims-data:/app/data
      - shims-storage:/app/storage
      - shims-generated:/app/generated
    environment:
      - SHIMS_HOST=0.0.0.0
      - SHIMS_DB_PATH=/app/storage/shims.sqlite3
      - SHIMS_DEMO_MODE=true
      - SHIMS_SECRET_KEY=${SHIMS_SECRET_KEY:-change-me-in-production}
      - SHIMS_BRIDGE_TOKEN=${SHIMS_BRIDGE_TOKEN:-change-me-in-production}
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  shims-enterprise:
    build: .
    image: shims:latest
    container_name: shims-enterprise
    command: >
      python -m uvicorn shims_enterprise.app:app
      --host 0.0.0.0 --port 8020
    ports:
      - "8020:8020"
    volumes:
      - shims-data:/app/data
      - shims-storage:/app/storage
      - shims-generated:/app/generated
    environment:
      - SHIMS_HOST=0.0.0.0
      - SHIMS_DB_PATH=/app/storage/shims.sqlite3
      - SHIMS_DEMO_MODE=true
      - SHIMS_SECRET_KEY=${SHIMS_SECRET_KEY:-change-me-in-production}
      - SHIMS_BRIDGE_TOKEN=${SHIMS_BRIDGE_TOKEN:-change-me-in-production}
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      shims-omni:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8020/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  shims-data:
  shims-storage:
  shims-generated:
