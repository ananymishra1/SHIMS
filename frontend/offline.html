<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#087f8c">
  <title>Shims Offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f7f9;
      color: #162128;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(420px, calc(100vw - 32px));
      border: 1px solid #d8e0e7;
      border-radius: 10px;
      background: #fff;
      padding: 22px;
      box-shadow: 0 12px 28px rgba(22, 33, 40, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: #61717f;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main>
    <h1>Shims is offline</h1>
    <p>The app shell is available, but the local backend is not reachable. Start the Shims API on your computer, then reopen the app.</p>
  </main>
</body>
</html>
